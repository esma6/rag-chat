<!doctype html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Akademi AI RAG Chat</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"/>

<style>
body {
  font-family: Inter;
  background: linear-gradient(135deg,#f8fafc,#eef2f7);
}

.card {
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(10px);
  border: 1px solid #e2e8f0;
  border-radius: 18px;
}

.file-btn {
  width: 28px;
  height: 28px;
  display:flex;
  align-items:center;
  justify-content:center;
  border:1px solid #e2e8f0;
  border-radius:8px;
  transition:.2s;
}

.file-btn:hover {
  transform: scale(1.1);
  border-color:#6366f1;
}
</style>
</head>

<body class="p-6">

<div class="max-w-6xl mx-auto">

<!-- HEADER -->
<div class="flex justify-between mb-6">
  <div>
    <h1 class="text-2xl font-semibold">Akademi AI</h1>
    <p class="text-sm opacity-60">RAG Chat System</p>
  </div>

  <button id="toggleSources" class="px-3 py-1 border rounded-lg text-xs">
    📚 Kaynakları Göster
  </button>
</div>

<div class="grid grid-cols-12 gap-6">

<!-- FILE PANEL -->
<div class="col-span-4 card p-4">

<label class="block border-dashed border p-4 rounded-xl text-center cursor-pointer">
📄 Dosya Yükle
<input id="fileInput" type="file" multiple class="hidden"/>
</label>

<div id="fileList" class="mt-3 space-y-2 text-xs"></div>

</div>

<!-- CHAT -->
<div class="col-span-8 card p-4 flex flex-col h-[600px]">

<div id="chat" class="flex-1 overflow-auto space-y-3 text-sm p-2"></div>

<form id="form" class="flex gap-2 mt-3">
  <input id="input"
    class="flex-1 border rounded-xl p-3"
    placeholder="Mesaj yaz..."
  />
  <button class="bg-indigo-500 text-white px-4 rounded-xl">
    Gönder
  </button>
</form>

</div>

</div>
</div>

<script>

const API = "http://127.0.0.1:8000";

/* STATE */
let files = [];
let showSources = true;

/* TOGGLE SOURCES */
document.getElementById("toggleSources").onclick = () => {
  showSources = !showSources;
  document.getElementById("toggleSources").innerText =
    showSources ? "📚 Kaynakları Gizle" : "📚 Kaynakları Göster";
};

/* ---------------- FILE UPLOAD ---------------- */
document.getElementById("fileInput").onchange = async (e) => {

  const fd = new FormData();
  [...e.target.files].forEach(f => fd.append("files", f));

  const res = await fetch(API + "/upload", {
    method: "POST",
    body: fd
  });

  const data = await res.json();
  console.log("UPLOAD:", data);

  if (!data.results) return;

  data.results.forEach(x => {
    if (x.status === "ok") {
      files.push({
        name: x.filename,
        active: true,
        chunks: x.chunks
      });
    }
  });

  renderFiles();
};

/* ---------------- FILE RENDER ---------------- */
function renderFiles() {
  const box = document.getElementById("fileList");
  box.innerHTML = "";

  files.forEach((f, i) => {
    const el = document.createElement("div");

    el.className = "flex items-center gap-2 border p-2 rounded-lg";

    el.innerHTML = `
      <i class="fas fa-file text-gray-500"></i>

      <span class="flex-1 truncate">${f.name}</span>

      <!-- ACTIVE TOGGLE -->
      <button onclick="toggle(${i})" class="file-btn">
        <i class="fas ${f.active ? 'fa-eye' : 'fa-eye-slash'}"></i>
      </button>
    `;

    box.appendChild(el);
  });
}

function toggle(i){
  files[i].active = !files[i].active;
  renderFiles();
}

/* ---------------- CHAT ---------------- */
document.getElementById("form").onsubmit = async (e) => {
  e.preventDefault();

  const input = document.getElementById("input");
  const msg = input.value.trim();
  if (!msg) return;

  input.value = "";

  addMessage("user", msg);

  const res = await fetch(API + "/chat", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      message: msg,
      show_sources: showSources,
      active_files: files.filter(f => f.active).map(f => f.name)
    })
  });

  const data = await res.json();
  console.log("CHAT:", data);

  let src = "";
  if (showSources && data.sources?.length) {
    src = `
      <div class="text-xs mt-2 opacity-60">
        📚 ${data.sources.map(s =>
          `<span class="px-2 py-1 border rounded">${s}</span>`
        ).join(" ")}
      </div>
    `;
  }

  addMessage("ai", data.answer + src);
};

/* ---------------- CHAT UI ---------------- */
function addMessage(type, text) {
  const div = document.createElement("div");

  div.className = type === "user" ? "text-right" : "text-left";

  div.innerHTML = `
    <div class="inline-block p-3 rounded-xl border max-w-[80%]
      ${type === "user"
        ? "bg-indigo-500 text-white"
        : "bg-white/70"}">
      ${text}
    </div>
  `;

  document.getElementById("chat").appendChild(div);
  document.getElementById("chat").scrollTop =
    document.getElementById("chat").scrollHeight;
}

</script>

</body>
</html>
