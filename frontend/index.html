<!DOCTYPE html>
<html lang="tr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YZTA | Akademi AI DocChat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Geist+Mono:wght@400;600&family=Instrument+Serif:ital@0;1&display=swap');

        :root[data-theme="light"] {
            --bg: #f8fafc; --surface: #ffffff; --border: #e2e8f0; --text: #0f172a; --text-sub: #64748b;
            --accent: #4f46e5; --yzta-red: #ea4335; --yzta-green: #34a853; --yzta-blue: #4285f4; --yzta-yellow: #fbbc05;
        }
        :root[data-theme="dark"] {
            --bg: #020617; --surface: #0f172a; --border: #1e293b; --text: #f1f5f9; --text-sub: #94a3b8;
            --accent: #818cf8;
        }

        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; transition: all 0.3s ease; }

        .layout { display: grid; grid-template-rows: 64px 1fr; height: 100vh; }
        .main-content { display: grid; grid-template-columns: 320px 1fr; height: calc(100vh - 64px); overflow: hidden; }

        .sidebar { background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; height: 100%; overflow: hidden; }
        #fileList { flex: 1; overflow-y: auto; padding-top: 4px; padding-bottom: 20px; }

        #previewModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; backdrop-filter: blur(4px); align-items: center; justify-content: center; }
        .modal-content { background: var(--surface); width: 90%; max-width: 1200px; height: 90vh; border-radius: 24px; display: flex; flex-direction: column; border: 1px solid var(--border); overflow: hidden; }
        #modalBody { flex: 1; width: 100%; height: 100%; overflow: hidden; position: relative; }

        .file-item { display: flex; align-items: center; gap: 10px; padding: 12px 16px; margin: 0 16px 8px; border-radius: 12px; background: var(--bg); border: 1px solid var(--border); font-size: 12px; transition: 0.2s; }
        .file-item.off { opacity: 0.4; }
        .file-status { width: 8px; height: 8px; border-radius: 50%; cursor: pointer; }

        .chat-main { display: flex; flex-direction: column; background: transparent; overflow: hidden; height: 100%; }
        #chat { flex: 1; overflow-y: auto; padding: 40px 10%; display: flex; flex-direction: column; gap: 24px; }

        .ai-bubble { background: var(--surface); border: 1px solid var(--border); border-radius: 20px 20px 20px 4px; padding: 16px; font-size: 14px; line-height: 1.6; }
        .user-bubble { background: var(--text); color: var(--bg); border-radius: 20px 20px 4px 20px; padding: 16px; font-size: 14px; align-self: flex-end; }

        .pill { padding: 8px 16px; border-radius: 12px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 11px; font-weight: 700; transition: 0.2s; cursor: pointer; white-space: nowrap; }
        .pill:hover { border-color: var(--yzta-blue); transform: translateY(-1px); color: var(--yzta-blue); }

        .icon-btn { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; border: none; background: transparent; color: var(--text-sub); }
        .icon-btn:hover { background: var(--border); color: var(--text); }
        .icon-btn.send { background: var(--yzta-blue); color: white; width: 40px; height: 40px; border-radius: 12px; }

        .toggle-btn { padding: 4px 12px; border-radius: 20px; font-size: 10px; font-weight: 800; transition: 0.3s; }
        .toggle-btn.on { background: rgba(52, 168, 83, 0.1); color: var(--yzta-green); border: 1px solid var(--yzta-green); }
        .toggle-btn.off { background: rgba(234, 67, 53, 0.1); color: var(--yzta-red); border: 1px solid var(--yzta-red); }

        .logo-text-blue { color: #4285F4; font-weight: 800; font-size: 20px; letter-spacing: -0.02em; }
        .logo-text-ai { font-family: 'Instrument Serif', serif; font-style: italic; font-size: 22px; color: var(--text); margin-left: 4px; }
        .welcome-logo-blue { color: #4285F4; font-weight: 800; font-size: 42px; letter-spacing: -0.04em; }
        .welcome-logo-ai { font-family: 'Instrument Serif', serif; font-style: italic; font-size: 46px; color: var(--text); margin-left: 6px; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="previewModal">
        <div class="modal-content">
            <div class="p-6 border-b border-[var(--border)] flex justify-between items-center bg-[var(--surface)]">
                <h3 id="modalTitle" class="font-bold text-sm truncate text-blue-500">Doküman Önizleme</h3>
                <button onclick="closePreview()" class="icon-btn hover:bg-red-50 hover:text-red-500"><i class="fas fa-times"></i></button>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

    <div class="layout">
        <header class="h-16 flex items-center justify-between px-6 bg-[var(--surface)] border-b border-[var(--border)] z-30">
            <div class="flex items-center gap-2">
                <img src="https://media.licdn.com/dms/image/v2/D4D0BAQFGnTtHn5gSjw/company-logo_200_200/B4DZcLv9DVHMAM-/0/1748248810056?e=2147483647&v=beta&t=TczzvkYrV4suzdu0SocIy4rScaSdfdwIrMK5Ij-AD9g" style="height: 36px; border-radius: 8px;">
                <div class="flex items-baseline">
                    <span class="logo-text-blue">Akademi</span>
                    <span class="logo-text-ai">AI</span>
                </div>
            </div>
            <button id="btnTheme" class="icon-btn border border-[var(--border)] shadow-sm !w-10 !h-10 hover:bg-[var(--bg)] transition-all">
                <i class="fas fa-circle-half-stroke text-blue-500"></i>
            </button>
        </header>

        <div class="main-content">
            <aside class="sidebar">
                <div class="flex-shrink-0">
                    <label class="m-5 p-6 border-2 border-dashed border-[var(--border)] rounded-2xl text-center cursor-pointer hover:bg-blue-500/5 transition-all group block">
                        <input type="file" id="fileInput" multiple class="hidden" accept=".pdf,.docx,.txt,.doc">
                        <i class="fas fa-cloud-upload-alt text-blue-500 text-xl mb-2 group-hover:scale-110 transition-transform"></i>
                        <p class="text-[10px] font-extrabold text-slate-400 uppercase tracking-wider">YENİ DOKÜMAN YÜKLE</p>
                    </label>
                </div>

                <div id="fileList"></div>

                <div class="p-6 border-t border-[var(--border)] bg-slate-50/30 dark:bg-slate-900/30 flex-shrink-0">
                    <div class="flex items-center justify-between">
                        <span class="text-[10px] font-bold text-slate-400 tracking-widest uppercase">Kaynaklar</span>
                        <button id="btnSources" class="toggle-btn on">AÇIK</button>
                    </div>
                </div>
            </aside>

            <main class="chat-main">
                <div id="chat">
                    <div id="welcome" class="m-auto text-center max-w-sm">
                        <div class="flex items-baseline justify-center mb-4">
                            <span class="welcome-logo-blue">Akademi</span>
                            <span class="welcome-logo-ai">AI</span>
                        </div>
                        <p class="text-sm text-slate-400 leading-relaxed italic">Analiz etmek istediğiniz dokümanları yükleyin ve sohbete başlayın.</p>
                    </div>
                </div>

                <div class="px-[10%] pb-4 flex gap-2 overflow-x-auto no-scrollbar flex-shrink-0">
                    <button class="pill" onclick="shortcut('Özet çıkar.')">📄 Özetle</button>
                    <button class="pill" onclick="shortcut('Anahtar kavramları listele.')">📖 Kavramlar</button>
                    <button class="pill" onclick="shortcut('Sayısal verileri analiz et.')">📊 Veriler</button>
                </div>

                <div class="p-6 px-[10%] bg-[var(--surface)] border-t border-[var(--border)] flex-shrink-0">
                    <div class="flex items-center gap-3 bg-[var(--bg)] rounded-2xl px-4 py-2 border border-[var(--border)] shadow-sm focus-within:border-blue-500 transition-colors">
                        <textarea id="input" rows="1" placeholder="Mesajınızı buraya yazın..." class="flex-1 bg-transparent outline-none resize-none text-sm py-2"></textarea>
                        <button id="sendBtn" class="icon-btn send"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        const API = "http://127.0.0.1:8000";
        let files = [];
        let showSources = true;

        document.getElementById("btnTheme").onclick = () => {
            const current = document.documentElement.getAttribute("data-theme");
            document.documentElement.setAttribute("data-theme", current === "dark" ? "light" : "dark");
        };

        document.getElementById("btnSources").onclick = function() {
            showSources = !showSources;
            this.innerText = showSources ? "AÇIK" : "KAPALI";
            this.className = `toggle-btn ${showSources ? 'on' : 'off'}`;
        };

        document.getElementById("fileInput").onchange = async (e) => {
            const fd = new FormData();
            [...e.target.files].forEach(f => fd.append("files", f));
            try {
                const res = await fetch(API + "/upload", { method: "POST", body: fd });
                const data = await res.json();
                data.results.forEach(x => {
                    if (x.status === "ok") files.push({ name: x.filename, active: true });
                });
                renderFiles();
            } catch (err) { console.error("Upload error:", err); }
        };

        function renderFiles() {
            const box = document.getElementById("fileList");
            box.innerHTML = "";
            files.forEach((f, i) => {
                const el = document.createElement("div");
                el.className = `file-item ${f.active ? '' : 'off'}`;
                el.innerHTML = `
                    <div onclick="toggleFile(${i})" class="file-status" style="background: ${f.active ? 'var(--yzta-green)' : 'var(--text-sub)'}"></div>
                    <span onclick="toggleFile(${i})" class="flex-1 truncate font-bold cursor-pointer hover:text-blue-500 transition-colors">${f.name}</span>
                    <button onclick="previewFile(${i})" class="icon-btn"><i class="far fa-eye"></i></button>
                    <button onclick="removeFile(${i})" class="icon-btn hover:text-red-500"><i class="far fa-trash-alt"></i></button>
                `;
                box.appendChild(el);
            });
        }

        // 🔥 GÜNCELLENDİ: Backend'den de siler
        async function removeFile(i) {
            const fileName = files[i].name;
            try {
                const res = await fetch(`${API}/remove_file?filename=${encodeURIComponent(fileName)}`, { method: 'POST' });
                if (res.ok) {
                    files.splice(i, 1);
                    renderFiles();
                    if(files.length === 0) location.reload(); // Tam temizlik için sayfayı tazele
                }
            } catch (err) { console.error("Silme hatası:", err); }
        }

        async function previewFile(i) {
            const filename = files[i].name;
            const isPDF = filename.toLowerCase().endsWith('.pdf');
            const modalBody = document.getElementById("modalBody");

            document.getElementById("modalTitle").innerText = filename;
            document.getElementById("previewModal").style.display = "flex";
            modalBody.innerHTML = `<div class="flex items-center justify-center h-full animate-pulse text-sm italic">YZTA Veri Ambarı taranıyor...</div>`;

            if (isPDF) {
                modalBody.innerHTML = `<iframe src="${API}/get_pdf/${encodeURIComponent(filename)}#view=FitH" style="width:100%; height:100%; border:none; background:white;"></iframe>`;
            } else {
                try {
                    const res = await fetch(`${API}/preview?filename=${encodeURIComponent(filename)}`);
                    const data = await res.json();
                    modalBody.innerHTML = `<div class="p-8 h-full overflow-y-auto whitespace-pre-wrap text-sm leading-relaxed">${data.content || "İçerik boş."}</div>`;
                } catch (err) { modalBody.innerHTML = `<div class="p-8 text-red-500">Hata: İçerik çekilemedi.</div>`; }
            }
        }

        function closePreview() { document.getElementById("previewModal").style.display = "none"; }
        function toggleFile(i) { files[i].active = !files[i].active; renderFiles(); }

        async function send() {
            const inp = document.getElementById("input");
            const msg = inp.value.trim();
            if (!msg) return;

            // KONTROL: Aktif dosya var mı?
            const activeCount = files.filter(f => f.active).length;
           if (activeCount === 0) {
    document.getElementById("welcome")?.remove();

    const aiBubble = addAI();
    aiBubble.innerText = "Şu an analiz edebileceğim bir doküman yok 📄\n\nLütfen önce bir dosya yükleyin.";

    return;
}

            document.getElementById("welcome")?.remove();
            inp.value = ""; addUser(msg);
            const aiBubble = addAI();

            try {
                const res = await fetch(API + "/chat/stream", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        message: msg,
                        show_sources: showSources,
                        active_files: files.filter(f => f.active).map(f => f.name)
                    })
                });

                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let full = "";
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value);
                    if (chunk.includes("__SOURCES__:")) {
                        const [text, src] = chunk.split("__SOURCES__:");
                        full += text; aiBubble.innerText = full.trim();
                        if (showSources && src) {
                            const d = document.createElement("div"); d.className = "flex flex-wrap gap-2 mt-4";
                            src.split(",").filter(Boolean).forEach(s => {
                                d.innerHTML += `<span class="text-[9px] font-bold bg-blue-500/10 text-blue-500 px-2 py-1 rounded">📚 ${s.trim()}</span>`;
                            });
                            aiBubble.appendChild(d);
                        }
                    } else { full += chunk; aiBubble.innerText = full; }
                    document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
                }
            } catch { aiBubble.innerText = "Bağlantı hatası."; }
        }

        function addUser(t) { document.getElementById("chat").innerHTML += `<div class="user-bubble shadow-sm">${t}</div>`; }
        function addAI() {
            const d = document.createElement("div"); d.className = "flex gap-3 max-w-[85%]";
            d.innerHTML = `
                <div class="w-8 h-8 rounded-lg bg-white border border-slate-200 p-1 flex-shrink-0 shadow-sm overflow-hidden">
                    <img src="https://media.licdn.com/dms/image/v2/D4D0BAQFGnTtHn5gSjw/company-logo_200_200/B4DZcLv9DVHMAM-/0/1748248810056?e=2147483647&v=beta&t=TczzvkYrV4suzdu0SocIy4rScaSdfdwIrMK5Ij-AD9g" class="h-full w-full object-contain">
                </div>
                <div class="ai-bubble">...</div>`;
            document.getElementById("chat").appendChild(d);
            return d.querySelector(".ai-bubble");
        }

        function shortcut(t) { document.getElementById("input").value = t; document.getElementById("input").focus(); }
        document.getElementById("sendBtn").onclick = send;
        document.getElementById("input").onkeydown = (e) => { if(e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } };
    </script>
</body>
</html>
